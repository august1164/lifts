  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

a0362\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"default\">\n<meta name=\"apple-mobile-web-app-title\" content=\"Lifts\">\n<meta name=\"theme-color\" content=\"#F5F4F1\">\n<link rel=\"apple-touch-icon\" href=\"055e6dcd-3d7b-44fd-b4e3-7cf2b0965bc3\">\n\n<style>\n  *{box-sizing:border-box;}\n  html,body{height:100%;overflow:hidden;}\n  body{margin:0;background:#F5F4F1;-webkit-tap-highlight-color:transparent;}\n  a{color:#1A1A17;} a:hover{color:#5b5b54;}\n  ::-webkit-scrollbar{width:0;height:0;}\n  @keyframes restpulse{0%,100%{opacity:1}50%{opacity:.55}}\n  @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}\n  textarea,input{font-family:'Instrument Sans',system-ui,sans-serif;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"position:relative;width:100vw;height:100dvh;background:#F5F4F1;font-family:'Instrument Sans',system-ui,sans-serif;color:#1A1A17;-webkit-font-smoothing:antialiased;overflow:hidden;\">\n\n  <!-- ============ BASE LAYER: screens + tab bar ============ -->\n  <div style=\"height:100%;display:flex;flex-direction:column;\">\n    <div style=\"flex:1;overflow-y:auto;\">\n\n      <!-- ---------- TODAY ---------- -->\n      <sc-if value=\"{{ isToday }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:56px 20px 28px;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;\">\n          <div>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#A7A69C;\">{{ dateLabel }}<\u002Fdiv>\n            <div style=\"font-size:30px;font-weight:600;letter-spacing:-.02em;margin-top:6px;\">Ready to train.<\u002Fdiv>\n          <\u002Fdiv>\n          <div onclick=\"{{ onOpenSettings }}\" style=\"width:40px;height:40px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.05);flex-shrink:0;margin-top:4px;\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5A5952\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M4 7h5M15 7h5M4 12h9M17 12h3M4 17h2M10 17h10\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"2.1\"><\u002Fcircle><circle cx=\"16\" cy=\"12\" r=\"2.1\"><\u002Fcircle><circle cx=\"9\" cy=\"17\" r=\"2.1\"><\u002Fcircle><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ nextUp.empty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:20px;background:#fff;border-radius:24px;padding:26px 22px;box-shadow:0 1px 2px rgba(0,0,0,.04);text-align:center;\">\n          <div style=\"font-size:17px;font-weight:600;\">No programmes yet<\u002Fdiv>\n          <div style=\"font-size:13px;color:#8A897F;margin-top:4px;line-height:1.5;\">Add a programme to get started, or paste one with + New.<\u002Fdiv>\n          <div onclick=\"{{ onOpenBuilder }}\" style=\"margin-top:16px;background:#1A1A17;color:#fff;border-radius:15px;height:50px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;cursor:pointer;\">+ New programme<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ nextUp.notEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:20px;background:#1A1A17;border-radius:24px;padding:22px;color:#fff;box-shadow:0 12px 30px rgba(0,0,0,.14);\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.5);\">{{ nextUp.progLabel }}<\u002Fdiv>\n            <div onclick=\"{{ nextUp.onSwitch }}\" style=\"font-size:12px;font-weight:600;color:rgba(255,255,255,.85);cursor:pointer;\">Switch day<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:24px;font-weight:600;margin-top:10px;letter-spacing:-.01em;\">{{ nextUp.dayName }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:rgba(255,255,255,.62);margin-top:3px;\">{{ nextUp.tag }}<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;\">\n            <sc-for list=\"{{ nextUp.exNames }}\" as=\"x\" hint-placeholder-count=\"5\">\n              <div style=\"font-size:12px;color:rgba(255,255,255,.82);background:rgba(255,255,255,.09);border-radius:8px;padding:6px 10px;\">{{ x.name }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.5);margin-top:18px;\">{{ nextUp.lastNote }}<\u002Fdiv>\n          <div onclick=\"{{ nextUp.onStart }}\" style=\"margin-top:14px;background:#fff;color:#1A1A17;border-radius:15px;height:52px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;cursor:pointer;\">Start workout<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin:26px 2px 10px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#A7A69C;\">Programmes<\u002Fdiv>\n          <div onclick=\"{{ onOpenBuilder }}\" style=\"font-size:13px;font-weight:600;color:#1A1A17;cursor:pointer;\">+ New<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04);\">\n          <sc-for list=\"{{ programmes }}\" as=\"p\" hint-placeholder-count=\"2\">\n            <div onclick=\"{{ p.onOpen }}\" style=\"display:flex;align-items:center;gap:14px;padding:16px 18px;border-top:1px solid rgba(0,0,0,.06);cursor:pointer;\">\n              <div style=\"flex:1;\">\n                <div style=\"display:flex;align-items:center;gap:8px;\">\n                  <div style=\"font-size:16px;font-weight:600;\">{{ p.name }}<\u002Fdiv>\n                  <sc-if value=\"{{ p.isCurrent }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#3A6B4A;background:#EAF1EB;border-radius:6px;padding:3px 6px;\">Current<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font-size:12px;color:#8A897F;margin-top:2px;\">{{ p.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n              <svg width=\"8\" height=\"14\" viewBox=\"0 0 8 14\"><path d=\"M1 1l6 6-6 6\" stroke=\"#C6C5BC\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ---------- HISTORY ---------- -->\n      <sc-if value=\"{{ isHistory }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:56px 20px 28px;\">\n        <div style=\"font-size:30px;font-weight:600;letter-spacing:-.02em;\">History<\u002Fdiv>\n        <div style=\"font-size:13px;color:#8A897F;margin-top:2px;\">{{ historyCount }} workouts logged<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;margin-top:20px;\">\n          <sc-for list=\"{{ history }}\" as=\"h\" hint-placeholder-count=\"5\">\n            <div style=\"background:#fff;border-radius:20px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.04);\">\n              <div style=\"display:flex;align-items:baseline;justify-content:space-between;\">\n                <div styl n          <div style=\"font-size:15px;\">Bar weight<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8A897F;margin-top:2px;\">Used by the \"+ Bar\" button when logging<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px;\">\n          <div onclick=\"{{ onBarDown }}\" style=\"width:34px;height:34px;border-radius:10px;background:#F1F0EB;display:flex;align-items:center;justify-content:center;font-size:20px;color:#8A897F;cursor:pointer;\">−<\u002Fdiv>\n          <div style=\"min-width:56px;text-align:center;font-size:17px;font-weight:600;font-variant-numeric:tabular-nums;\">{{ barLabel }}<\u002Fdiv>\n          <div onclick=\"{{ onBarUp }}\" style=\"width:34px;height:34px;border-radius:10px;background:#F1F0EB;display:flex;align-items:center;justify-content:center;font-size:20px;color:#8A897F;cursor:pointer;\">+<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#A7A69C;margin:24px 2px 10px;\">Use on another phone<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 1px 2px rgba(0,0,0,.04);\">\n        <div style=\"font-size:13px;line-height:1.5;color:#6E6D66;\">Copy this backup code, then open the app on your other phone and paste it below to pull your data across.<\u002Fdiv>\n        <div style=\"margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.4;color:#6E6D66;background:#F1F0EB;border-radius:10px;padding:10px;max-height:66px;overflow:auto;user-select:all;word-break:break-all;\">{{ exportCode }}<\u002Fdiv>\n        <div onclick=\"{{ onCopyExport }}\" style=\"margin-top:10px;text-align:center;font-size:14px;font-weight:600;color:#fff;background:#1A1A17;border-radius:12px;padding:11px;cursor:pointer;\">Copy backup code<\u002Fdiv>\n        <textarea ref=\"{{ importRef }}\" placeholder=\"Paste a backup code from your other phone…\" style=\"width:100%;height:70px;margin-top:10px;border:1px solid rgba(0,0,0,.12);border-radius:12px;padding:11px;font-size:12px;font-family:'IBM Plex Mono',monospace;background:#fff;outline:none;resize:none;color:#1A1A17;\"><\u002Ftextarea>\n        <div onclick=\"{{ onImport }}\" style=\"margin-top:8px;text-align:center;font-size:14px;font-weight:600;color:#1A1A17;border:1px solid rgba(0,0,0,.15);border-radius:12px;padding:11px;cursor:pointer;\">Import from code<\u002Fdiv>\n        <sc-if value=\"{{ syncMsgOn }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:10px;text-align:center;font-size:13px;font-weight:600;color:#3A6B4A;\">{{ syncMsg }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#A7A69C;margin:24px 2px 10px;\">Data<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 1px 2px rgba(0,0,0,.04);\">\n        <div style=\"font-size:13px;line-height:1.5;color:#6E6D66;\">Your workouts, routines and coach chats are saved on this device automatically.<\u002Fdiv>\n        <div onclick=\"{{ onResetData }}\" style=\"margin-top:12px;text-align:center;font-size:14px;font-weight:600;color:#8A5A3C;border:1px solid rgba(138,90,60,.3);border-radius:12px;padding:11px;cursor:pointer;\">Reset demo data<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ SUMMARY ============ -->\n  <sc-if value=\"{{ summaryOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:absolute;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;\">\n    <div style=\"position:absolute;inset:0;background:rgba(20,20,18,.55);backdrop-filter:blur(4px);\"><\u002Fdiv>\n    <div style=\"position:relative;background:#fff;border-radius:28px;padding:28px 24px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.3);text-align:center;\">\n      <div style=\"width:56px;height:56px;border-radius:18px;background:#1A1A17;display:flex;align-items:center;justify-content:center;margin:0 auto;\">\n        <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\"><path d=\"M6 15l5 5 11-12\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"font-size:22px;font-weight:600;margin-top:16px;letter-spacing:-.01em;\">Workout complete<\u002Fdiv>\n      <div style=\"font-size:13px;color:#8A897F;margin-top:3px;\">{{ summary.name }}<\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;gap:24px;margin-top:22px;\">\n        <div><div style=\"font-size:22px;font-weight:600;\">{{ summary.dur }}<\u002Fdiv><div style=\"font-size:10px;color:#A7A69C;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;\">Time<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:22px;font-weight:600;\">{{ summary.vol }}<\u002Fdiv><div style=\"font-size:10px;color:#A7A69C;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;\">{{ unit }}<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:22px;font-weight:600;\">{{ summary.sets }}<\u002Fdiv><div style=\"font-size:10px;color:#A7A69C;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;\">Sets<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ onSummaryDone }}\" style=\"margin-top:24px;background:#1A1A17;color:#fff;border-radius:15px;height:52px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;cursor:pointer;\">Done<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;482px&quot;,&quot;height&quot;:&quot;962px&quot;},&quot;units&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;lb&quot;,&quot;kg&quot;],&quot;default&quot;:&quot;lb&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Starting defaults&quot;},&quot;weightIncrement&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;2.5&quot;,&quot;5&quot;,&quot;10&quot;],&quot;default&quot;:&quot;5&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Starting defaults&quot;},&quot;restSeconds&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:120,&quot;min&quot;:30,&quot;max&quot;:300,&quot;step&quot;:15,&quot;unit&quot;:&quot;s&quot;,&quot;section&quot;:&quot;Starting defaults&quot;}}\">\nclass Component extends DCLogic {\n  KEY = 'wt_tracker_v4';\n  coachInputRef = React.createRef();\n  coachScrollRef = React.createRef();\n  builderRef = React.createRef();\n  importRef = React.createRef();\n\n  state = {\n    editor: null,\n    syncMsg: '',\n    tab: 'today',\n    activeOpen: false,\n    pickerOpen: false,\n    settingsOpen: false,\n    builderOpen: false,\n    builderLoading: false,\n    builderError: '',\n    workout: null,\n    now: Date.now(),\n    restEndsAt: null,\n    restTotal: 0,\n    summary: null,\n    settings: null,\n    programmes: null,\n    currentProgramId: null,\n    detailProgId: null,\n    renaming: false,\n    renameStr: '',\n    confirmProg: null,\n    history: null,\n    lastPerf: null,\n    coachMsgs: null,\n    coachLoading: false,\n  };\n\n  // ---------- seed data ----------\n  seedProgrammes = [\n    { id: 'ppl', name: 'Push / Pull / Legs', lastDayIdx: 0, lastAt: 'Jul 5', days: [\n      { name: 'Push Day', tag: 'Chest · Shoulders · Triceps', ex: [\n        { name: 'Bench Press', muscle: 'Chest', prev: '135 × 8', target: '4 × 8' },\n        { name: 'Overhead Press', muscle: 'Shoulders', prev: '85 × 8', target: '4 × 8' },\n        { name: 'Incline DB Press', muscle: 'Chest', prev: '50 × 10', target: '3 × 10' },\n        { name: 'Lateral Raise', muscle: 'Shoulders', prev: '20 × 12', target: '3 × 12' },\n        { name: 'Triceps Pushdown', muscle: 'Triceps', prev: '60 × 12', target: '3 × 12' },\n      ]},\n      { name: 'Pull Day', tag: 'Back · Biceps', ex: [\n        { name: 'Lat Pulldown', muscle: 'Back', prev: '120 × 10', target: '4 × 10' },\n        { name: 'Barbell Row', muscle: 'Back', prev: '115 × 8', target: '4 × 8' },\n        { name: 'Seated Cable Row', muscle: 'Back', prev: '110 × 10', target: '3 × 10' },\n        { name: 'Barbell Curl', muscle: 'Biceps', prev: '65 × 10', target: '3 × 10' },\n        { name: 'Face Pull', muscle: 'Rear Delts', prev: '40 × 15', target: '3 × 15' },\n      ]},\n      { name: 'Leg Day', tag: 'Quads · Hamstrings · Glutes', ex: [\n        { name: 'Back Squat', muscle: 'Quads', prev: '185 × 6', target: '4 × 6' },\n        { name: 'Romanian Deadlift', muscle: 'Hamstrings', prev: '155 × 8', target: '4 × 8' },\n        { name: 'Leg Press', muscle: 'Quads', prev: '270 × 10', target: '3 × 10' },\n        { name: 'Leg Curl', muscle: 'Hamstrings', prev: '90 × 12', target: '3 × 12' },\n        { name: 'Standing Calf Raise', muscle: 'Calves', prev: '120 × 15', target: '3 × 15' },\n      ]},\n    ]},\n    { id: 'ul', name: 'Upper / Lower', lastDayIdx: -1, lastAt: null, days: [\n      { name: 'Upper Body', tag: 'Chest · Back · Arms', ex: [\n        { name: 'Bench Press', muscle: 'Chest', prev: '135 × 8', target: '4 × 8' },\n        { name: 'Barbell Row', muscle: 'Back', prev: '115 × 8', target: '4 × 8' },\n        { name: 'Overhead Press', muscle: 'Shoulders', prev: '85 × 8', target: '3 × 8' },\n        { name: 'Lat Pulldown', muscle: 'Back', prev: '120 × 10', target: '3 × 10' },\n        { name: 'Barbell Curl', muscle: 'Biceps', prev: '65 × 10', target: '3 × 10' },\n      ]},\n      { name: 'Lower Body', tag: 'Quads · Hams · Calves', ex: [\n        { name: 'Back Squat', muscle: 'Quads', prev: '185 × 6', target: '4 × 6' },\n        { name: 'Romanian Deadlift', muscle: 'Hamstrings', prev: '155 × 8', target: '4 × 8' },\n        { name: 'Leg Press', muscle: 'Quads', prev: '270 × 10', target: '3 × 10' },\n        { name: 'Leg Curl', muscle: 'Hamstrings', prev: '90 × 12', target: '3 × 12' },\n        { name: 'Standing Calf Raise', muscle: 'Calves', prev: '120 × 15', target: '3 × 15' },\n      ]},\n    ]},\n  ];\n\n  library = [\n    { name: 'Bench Press', muscle: 'Chest', last: 'Used 4 days ago' },\n    { name: 'Incline DB Press', muscle: 'Chest', last: 'Used 4 days ago' },\n    { name: 'Overhead Press', muscle: 'Shoulders', last: 'Used 4 days ago' },\n    { name: 'Lateral Raise', muscle: 'Shoulders', last: 'Used 4 days ago' },\n    { name: 'Triceps Pushdown', muscle: 'Triceps', last: 'Used 4 days ago' },\n    { name: 'Lat Pulldown', muscle: 'Back', last: 'Used 2 days ago' },\n    { name: 'Barbell Row', muscle: 'Back', last: 'Used 2 days ago' },\n    { name: 'Barbell Curl', muscle: 'Biceps', last: 'Used 2 days ago' },\n    { name: 'Back Squat', muscle: 'Quads', last: 'Used 6 days ago' },\n    { name: 'Romanian Deadlift', muscle: 'Hams', last: 'Used 6 days ago' },\n    { name: 'Leg Press', muscle: 'Quads', last: 'Used 6 days ago' },\n    { name: 'Standing Calf Raise', muscle: 'Calves', last: 'Used 6 days ago' },\n  ];\n\n  records = [\n    { lift: 'Deadlift', value: '315 lb', date: 'Jun 20' },\n    { lift: 'Back Squat', value: '245 lb', date: 'Jun 26' },\n    { lift: 'Bench Press', value: '175 lb', date: 'Jul 5' },\n    { lift: 'Overhead Press', value: '115 lb', date: 'Jun 30' },\n  ];\n\n  seedHistory = [\n    { name: 'Push Day A', date: 'Jul 5', dur: '52 min', volume: '12,400', sets: 22 },\n    { name: 'Leg Day', date: 'Jul 3', dur: '61 min', volume: '18,900', sets: 20 },\n    { name: 'Pull Day A', date: 'Jul 1', dur: '47 min', volume: '11,200', sets: 21 },\n    { name: 'Push Day A', date: 'Jun 28', dur: '50 min', volume: '12,050', sets: 22 },\n    { name: 'Leg Day', date: 'Jun 26', dur: '58 min', volume: '18,100', sets: 20 },\n    { name: 'Pull Day A', date: 'Jun 24', dur: '46 min', volume: '10,800', sets: 21 },\n  ];\n\n  volumeVals = [38000, 42000, 40500, 47000, 44000, 51000, 49500, 54500];\n  benchTrend = [135, 140, 140, 150, 155, 160, 170, 175];\n\n  // ---------- lifecycle ----------\n  componentDidMount() {\n    let data = null;\n    try { const raw = localStorage.getItem(this.KEY); if (raw) data = JSON.parse(raw); } catch (e) {}\n    if (data) {\n      this.setState({\n        settings: data.settings || this.defaultSettings(),\n        programmes: data.programmes || this.seedProgrammes,\n        currentProgramId: data.currentProgramId || this.seedProgrammes[0].id,\n        history: data.history || this.seedHistory,\n        lastPerf: data.lastPerf || this.seedLastPerf(),\n        coachMsgs: data.coachMsgs || [],\n      });\n    } else {\n      this.setState({\n        settings: this.defaultSettings(),\n        programmes: this.seedProgrammes,\n        currentProgramId: this.seedProgrammes[0].id,\n        history: this.seedHistory,\n        lastPerf: this.seedLastPerf(),\n        coachMsgs: [],\n      }, this.persistNow);\n    }\n    this._t = setInterval(() => {\n      this.setState(s => {\n        const patch = { now: Date.now() };\n        if (s.restEndsAt && Date.now() >= s.restEndsAt) patch.restEndsAt = null;\n        return patch;\n      });\n    }, 500);\n  }\n  componentWillUnmount() { if (this._t) clearInterval(this._t); }\n  componentDidUpdate(pp, ps) {\n    if (this.state.tab === 'coach') {\n      const el = this.coachScrollRef.current;\n      if (el && (ps.coachMsgs !== this.state.coachMsgs || ps.coachLoading !== this.state.coachLoading || ps.tab !== 'coach')) {\n        el.scrollTop = el.scrollHeight;\n      }\n    }\n  }\n\n  defaultSettings() {\n    return {\n      units: this.props.units || 'lb',\n      weightIncrement: this.props.weightIncrement || '5',\n      restSeconds: this.props.restSeconds != null ? this.props.restSeconds : 120,\n      barWeight: (this.props.units === 'kg') ? 20 : 45,\n    };\n  }\n  seedLastPerf() {\n    const m = {};\n    this.seedProgrammes.forEach(pr => pr.days.forEach(d => d.ex.forEach(e => { const p = this.parse(e.prev); m[e.name] = { weight: p.a, reps: p.b, date: pr.lastAt || 'recent' }; })));\n    return m;\n  }\n  persistNow = () => {\n    try {\n      const { settings, programmes, currentProgramId, history, lastPerf, coachMsgs } = this.state;\n      localStorage.setItem(this.KEY, JSON.stringify({ settings, programmes, currentProgramId, history, lastPerf, coachMsgs }));\n    } catch (e) {}\n  };\n\n  // ---------- helpers ----------\n  S() { return this.state.settings || this.defaultSettings(); }\n  unit() { return this.S().units; }\n  step() { return Number(this.S().weightIncrement) || 5; }\n  restMs() { return (this.S().restSeconds || 120) * 1000; }\n  fmtClock(ms) { ms = Math.max(0, ms); const t = Math.floor(ms / 1000); const m = Math.floor(t / 60), s = t % 60; return m + ':' + String(s).padStart(2, '0'); }\n  fmtDur(ms) { const mins = Math.max(1, Math.round(ms / 60000)); return mins < 60 ? mins + ' min' : Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm'; }\n  fmtNum(n) { return n.toLocaleString('en-US'); }\n  parse(s) { const m = (s || '').match(/(\\d+)\\s*[×x]\\s*(\\d+)/); return m ? { a: +m[1], b: +m[2] } : { a: 45, b: 8 }; }\n\n  // ---------- workout actions ----------\n  startDay = (progId, dayIdx) => {\n    const prog = (this.state.programmes || this.seedProgrammes).find(p => p.id === progId);\n    if (!prog) return;\n    const day = prog.days[dayIdx];\n    if (!day) return;\n    const lp = this.state.lastPerf || {};\n    const exercises = day.ex.map(e => {\n      const base = lp[e.name] ? { a: lp[e.name].weight, b: lp[e.name].reps } : this.parse(e.prev);\n      const t = this.parse(e.target);\n      const sets = [];\n      for (let i = 0; i < t.a; i++) sets.push({ weight: base.a, reps: t.b || base.b, done: false });\n      const prevStr = lp[e.name] ? (lp[e.name].weight
